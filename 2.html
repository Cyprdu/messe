<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantus - Lecteur de Partitions</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #3d5afe;
            --accent-color: #ff4081;
            --text-color: #e0e0e0;
            --border-color: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100%; overflow: hidden;
        }

        #app { display: flex; flex-direction: column; height: 100vh; }
        
        header {
            background: var(--surface-color);
            padding: 1rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        nav {
            display: flex; gap: 10px; padding: 10px;
            background: var(--surface-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn {
            background: #333; color: white; border: none;
            padding: 12px 20px; border-radius: 8px;
            cursor: pointer; font-size: 1rem; display: flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary-color); }
        .btn-accent { background: var(--accent-color); }
        .btn-small { padding: 8px 12px; font-size: 0.9rem; }

        main { flex: 1; overflow-y: auto; padding: 20px; }

        .search-bar {
            width: 100%; padding: 15px; border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #252525; color: white; margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .song-card {
            background: var(--surface-color);
            padding: 15px; margin-bottom: 10px;
            border-radius: 8px; display: flex;
            justify-content: space-between; align-items: center;
            border-left: 4px solid var(--primary-color);
        }

        /* --- Mode Jeu --- */
        #performance-mode {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: black; z-index: 1000; display: none;
        }

        #pdf-viewport {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { max-width: 100%; max-height: 100%; }

        .tap-zone {
            position: absolute; top: 0; height: 100%; width: 25%;
            z-index: 1010;
        }
        .tap-left { left: 0; }
        .tap-right { right: 0; }

        #perf-toolbar {
            position: absolute; top: 0; width: 100%;
            background: rgba(0,0,0,0.85); padding: 10px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1020; transform: translateY(-100%);
            transition: transform 0.3s;
        }
        #performance-mode.show-ui #perf-toolbar { transform: translateY(0); }

        /* --- Éditeur de Messe --- */
        .editor-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            height: calc(100vh - 220px);
        }
        .column {
            background: var(--surface-color); border-radius: 12px;
            display: flex; flex-direction: column; padding: 15px;
        }
        .scroll-area { flex: 1; overflow-y: auto; }
        .setlist-item {
            background: #2c2c2c; padding: 12px; margin: 5px 0;
            border-radius: 6px; display: flex; align-items: center;
            gap: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h2>Cantus</h2>
        <div id="status" style="font-size: 0.8rem; color: #888;">Initialisation...</div>
    </header>

    <nav>
        <button class="btn" onclick="showView('library')"><i class="fas fa-book"></i> Bibliothèque</button>
        <button class="btn" onclick="showView('planner')"><i class="fas fa-list-ol"></i> Mes Messes</button>
    </nav>

    <main id="content"></main>
</div>

<div id="performance-mode" onclick="toggleUI(event)">
    <div id="perf-toolbar">
        <button class="btn btn-small" onclick="exitPerformance()"><i class="fas fa-times"></i> Quitter</button>
        <div style="text-align:center">
            <div id="perf-title" style="font-weight:bold">Chant</div>
            <div id="perf-page" style="font-size:0.8rem">Page 1</div>
        </div>
        <div style="width:80px"></div>
    </div>
    <div id="pdf-viewport">
        <div class="tap-zone tap-left" onclick="prevPage(event)"></div>
        <div class="tap-zone tap-right" onclick="nextPage(event)"></div>
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<script>
    /** --- CONFIGURATION --- **/
    const GITHUB_USER = 'VOTRE_USER'; 
    const GITHUB_REPO = 'VOTRE_REPO';
    const GITHUB_PATH = 'partitions';

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let state = {
        songs: [],
        messes: JSON.parse(localStorage.getItem('messes_v1')) || [],
        currentMesseIdx: null,
        activeSetlist: [],
        currentSongIdx: 0,
        pdfDoc: null,
        pageNum: 1
    };

    async function init() {
        await fetchLibrary();
        showView('library');
    }

    async function fetchLibrary() {
        const status = document.getElementById('status');
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`);
            if(!res.ok) throw new Error();
            const data = await res.json();
            state.songs = data.filter(f => f.name.endsWith('.pdf')).map(f => ({
                id: f.sha,
                name: f.name.replace('.pdf', '').replace(/_/g, ' '),
                url: f.download_url
            }));
            localStorage.setItem('cache_songs', JSON.stringify(state.songs));
            status.innerText = "Synchronisé";
        } catch(e) {
            state.songs = JSON.parse(localStorage.getItem('cache_songs')) || [];
            status.innerText = "Mode Hors-ligne";
        }
    }

    // --- NAVIGATION ---
    function showView(view) {
        const container = document.getElementById('content');
        if(view === 'library') renderLibrary(container);
        if(view === 'planner') renderPlanner(container);
    }

    function renderLibrary(container) {
        container.innerHTML = `
            <input type="text" class="search-bar" placeholder="Chercher un chant..." oninput="filterLib(this.value, 'main-list')">
            <div id="main-list"> ${renderSongList(state.songs, true)} </div>
        `;
    }

    function renderSongList(list, isLib) {
        return list.map(s => `
            <div class="song-card">
                <span>${s.name}</span>
                <button class="btn btn-primary btn-small" onclick="launchSingle('${s.id}')"><i class="fas fa-play"></i></button>
            </div>
        `).join('');
    }

    function renderPlanner(container) {
        container.innerHTML = `
            <button class="btn btn-primary" onclick="createMesse()" style="width:100%; margin-bottom:20px;">+ Nouvelle Messe</button>
            <div id="messes-list">
                ${state.messes.map((m, i) => `
                    <div class="song-card">
                        <span><strong>${m.name}</strong> (${m.songs.length} chants)</span>
                        <div style="display:flex; gap:5px">
                            <button class="btn btn-small" onclick="editMesse(${i})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-accent btn-small" onclick="startMesse(${i})"><i class="fas fa-play"></i></button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    // --- EDITEUR DE MESSE ---
    function createMesse() {
        const n = prompt("Nom de la Messe :");
        if(!n) return;
        state.messes.push({ name: n, songs: [] });
        save();
        showView('planner');
    }

    function editMesse(idx) {
        state.currentMesseIdx = idx;
        const m = state.messes[idx];
        const container = document.getElementById('content');
        
        container.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <button class="btn btn-small" onclick="showView('planner')">Retour</button>
                <h3>${m.name}</h3>
                <button class="btn btn-accent btn-small" onclick="deleteMesse(${idx})">Supprimer</button>
            </div>
            <div class="editor-container">
                <div class="column">
                    <input type="text" class="search-bar" placeholder="Rechercher..." oninput="filterLib(this.value, 'editor-lib-list')">
                    <div id="editor-lib-list" class="scroll-area">
                        ${state.songs.map(s => `<div class="setlist-item" onclick="addToMesse('${s.id}')">${s.name}</div>`).join('')}
                    </div>
                </div>
                <div class="column">
                    <h4>Ordre du service (Glisser pour trier)</h4>
                    <div id="sortable-list" class="scroll-area">
                        ${m.songs.map((s, i) => `
                            <div class="setlist-item" data-idx="${i}">
                                <i class="fas fa-grip-lines"></i>
                                <span style="flex:1">${s.name}</span>
                                <i class="fas fa-trash" onclick="removeFromMesse(${i})"></i>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;

        new Sortable(document.getElementById('sortable-list'), {
            animation: 150,
            onEnd: (e) => {
                const songs = state.messes[state.currentMesseIdx].songs;
                const item = songs.splice(e.oldIndex, 1)[0];
                songs.splice(e.newIndex, 0, item);
                save();
            }
        });
    }

    function addToMesse(id) {
        const s = state.songs.find(x => x.id === id);
        state.messes[state.currentMesseIdx].songs.push({...s});
        save();
        editMesse(state.currentMesseIdx);
    }

    function removeFromMesse(i) {
        state.messes[state.currentMesseIdx].songs.splice(i, 1);
        save();
        editMesse(state.currentMesseIdx);
    }

    function deleteMesse(i) { if(confirm("Supprimer ?")) { state.messes.splice(i, 1); save(); showView('planner'); } }

    function filterLib(val, targetId) {
        const filtered = state.songs.filter(s => s.name.toLowerCase().includes(val.toLowerCase()));
        document.getElementById(targetId).innerHTML = (targetId === 'main-list') 
            ? renderSongList(filtered, true) 
            : filtered.map(s => `<div class="setlist-item" onclick="addToMesse('${s.id}')">${s.name}</div>`).join('');
    }

    // --- MOTEUR DE RENDU PDF ---
    async function startMesse(idx) {
        state.activeSetlist = state.messes[idx].songs;
        if(state.activeSetlist.length === 0) return;
        state.currentSongIdx = 0;
        document.getElementById('performance-mode').style.display = 'block';
        loadPDF(state.activeSetlist[0].url);
    }

    async function loadPDF(url) {
        document.getElementById('perf-title').innerText = state.activeSetlist[state.currentSongIdx].name;
        const loading = pdfjsLib.getDocument(url);
        state.pdfDoc = await loading.promise;
        state.pageNum = 1;
        renderPage();
    }

    async function renderPage() {
        const page = await state.pdfDoc.getPage(state.pageNum);
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        
        const viewport = page.getViewport({ scale: 1.5 });
        const scale = Math.min(window.innerWidth / viewport.width, window.innerHeight / viewport.height);
        const scaledVP = page.getViewport({ scale: scale * 1.5 });

        canvas.height = scaledVP.height;
        canvas.width = scaledVP.width;
        await page.render({ canvasContext: ctx, viewport: scaledVP }).promise;
        document.getElementById('perf-page').innerText = `Chant ${state.currentSongIdx + 1} • Page ${state.pageNum}/${state.pdfDoc.numPages}`;
    }

    function nextPage(e) {
        e.stopPropagation();
        if(state.pageNum < state.pdfDoc.numPages) {
            state.pageNum++; renderPage();
        } else if(state.currentSongIdx < state.activeSetlist.length - 1) {
            state.currentSongIdx++; loadPDF(state.activeSetlist[state.currentSongIdx].url);
        }
    }

    function prevPage(e) {
        e.stopPropagation();
        if(state.pageNum > 1) {
            state.pageNum--; renderPage();
        } else if(state.currentSongIdx > 0) {
            state.currentSongIdx--; loadPDF(state.activeSetlist[state.currentSongIdx].url);
        }
    }

    function toggleUI() { document.getElementById('performance-mode').classList.toggle('show-ui'); }
    function exitPerformance() { document.getElementById('performance-mode').style.display = 'none'; }
    function save() { localStorage.setItem('messes_v1', JSON.stringify(state.messes)); }

    init();
</script>
</body>
</html>
