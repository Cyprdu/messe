<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantus Pro - Plein Écran</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #1a1a1a;
            --primary-color: #2979ff;
            --accent-color: #ff1744;
            --text-color: #f5f5f5;
            --border-color: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100%; overflow: hidden;
        }

        #app { display: flex; flex-direction: column; height: 100vh; background: #121212; }
        
        header {
            background: var(--surface-color);
            padding: 0.8rem 1rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        nav {
            display: flex; gap: 10px; padding: 10px;
            background: var(--surface-color);
        }

        .btn {
            background: #333; color: white; border: none;
            padding: 12px 20px; border-radius: 8px;
            cursor: pointer; font-size: 1rem; display: flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary-color); }
        .btn-accent { background: var(--accent-color); }

        main { flex: 1; overflow-y: auto; padding: 15px; }

        .search-bar {
            width: 100%; padding: 15px; border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #252525; color: white; margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .song-card {
            background: var(--surface-color);
            padding: 15px; margin-bottom: 8px;
            border-radius: 10px; display: flex;
            justify-content: space-between; align-items: center;
        }

        /* --- MODE PERFORMANCE PLEIN ÉCRAN --- */
        #performance-mode {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }

        #pdf-viewport {
            position: relative; 
            width: 100vw; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .tap-zone {
            position: absolute; top: 0; height: 100%; width: 20%;
            z-index: 100;
        }
        .tap-left { left: 0; }
        .tap-right { right: 0; }

        #perf-toolbar {
            position: absolute; top: 0; width: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            padding: 10px 20px; display: flex; justify-content: space-between;
            align-items: center; z-index: 200;
            transform: translateY(-100%);
            transition: transform 0.2s ease-in-out;
        }
        #performance-mode.show-ui #perf-toolbar { transform: translateY(0); }

        /* --- ÉDITEUR DE MESSE --- */
        .editor-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            height: calc(100vh - 200px);
        }
        .col { background: var(--surface-color); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; }
        .list-box { flex: 1; overflow-y: auto; border: 1px solid #333; border-radius: 8px; margin-top: 10px; }
        .item { padding: 12px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .item:active { background: #222; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h2 style="margin:0">Cantus</h2>
        <div id="sync-status" style="font-size: 0.7rem; color: #666;">Prêt</div>
    </header>
    <nav>
        <button class="btn" onclick="showView('library')"><i class="fas fa-music"></i> Bibliothèque</button>
        <button class="btn" onclick="showView('planner')"><i class="fas fa-calendar-alt"></i> Messes</button>
    </nav>
    <main id="content"></main>
</div>

<div id="performance-mode">
    <div id="perf-toolbar">
        <button class="btn btn-primary" onclick="exitPerformance()"><i class="fas fa-arrow-left"></i></button>
        <div style="text-align: center">
            <div id="perf-song-name" style="font-weight:bold; font-size:1.1rem">Chant</div>
            <div id="perf-page-count" style="font-size:0.8rem; color:#aaa">Page 1 / 1</div>
        </div>
        <div style="width:50px"></div>
    </div>
    
    <div id="pdf-viewport" onclick="handleCenterTap(event)">
        <div class="tap-zone tap-left" onclick="prevPage(event)"></div>
        <div class="tap-zone tap-right" onclick="nextPage(event)"></div>
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<script>
    // --- CONFIG ---
    const GITHUB_USER = 'VOTRE_UTILISATEUR'; 
    const GITHUB_REPO = 'VOTRE_DEPOT';
    const GITHUB_PATH = 'partitions';

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let state = {
        songs: [],
        messes: JSON.parse(localStorage.getItem('messes_v2')) || [],
        currentMesseIdx: null,
        activeSet: [],
        currentIdx: 0,
        pdf: null,
        pageNum: 1
    };

    async function init() {
        await loadLibrary();
        showView('library');
    }

    async function loadLibrary() {
        try {
            const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`);
            const d = await r.json();
            state.songs = d.filter(f => f.name.endsWith('.pdf')).map(f => ({
                id: f.sha,
                name: f.name.replace('.pdf', '').replace(/_/g, ' '),
                url: f.download_url
            }));
            localStorage.setItem('cache_songs', JSON.stringify(state.songs));
            document.getElementById('sync-status').innerText = "À jour";
        } catch(e) {
            state.songs = JSON.parse(localStorage.getItem('cache_songs')) || [];
            document.getElementById('sync-status').innerText = "Mode Hors-ligne";
        }
    }

    function showView(v) {
        const c = document.getElementById('content');
        if(v === 'library') {
            c.innerHTML = `<input type="text" class="search-bar" placeholder="Rechercher un chant..." oninput="searchSongs(this.value)">
                           <div id="lib-list">${renderList(state.songs)}</div>`;
        } else if(v === 'planner') {
            c.innerHTML = `<button class="btn btn-primary" onclick="newMesse()" style="width:100%; margin-bottom:15px;">+ Nouvelle Messe</button>
                           <div id="messes-list">${renderMesses()}</div>`;
        }
    }

    function renderList(list) {
        return list.map(s => `<div class="song-card"><span>${s.name}</span><button class="btn btn-primary" onclick="playSingle('${s.id}')"><i class="fas fa-play"></i></button></div>`).join('');
    }

    function renderMesses() {
        return state.messes.map((m, i) => `
            <div class="song-card">
                <span><strong>${m.name}</strong> (${m.songs.length} titres)</span>
                <div style="display:flex; gap:8px">
                    <button class="btn" onclick="editMesse(${i})"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-accent" onclick="startMesse(${i})"><i class="fas fa-play"></i></button>
                </div>
            </div>`).join('');
    }

    // --- LOGIQUE ÉDITION ---
    function editMesse(idx) {
        state.currentMesseIdx = idx;
        const m = state.messes[idx];
        document.getElementById('content').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <button class="btn" onclick="showView('planner')">Retour</button>
                <h3>${m.name}</h3>
                <button class="btn btn-accent" onclick="deleteMesse(${idx})"><i class="fas fa-trash"></i></button>
            </div>
            <div class="editor-grid">
                <div class="col">
                    <input type="text" class="search-bar" style="margin:0" placeholder="Filtrer..." oninput="filterEditor(this.value)">
                    <div id="editor-lib" class="list-box">
                        ${state.songs.map(s => `<div class="item" onclick="addSong('${s.id}')">${s.name}</div>`).join('')}
                    </div>
                </div>
                <div class="col">
                    <div id="messe-sortable" class="list-box">
                        ${m.songs.map((s, i) => `<div class="item" data-id="${i}"><i class="fas fa-bars"></i> ${s.name}</div>`).join('')}
                    </div>
                </div>
            </div>`;
        
        new Sortable(document.getElementById('messe-sortable'), {
            animation: 150,
            onEnd: (e) => {
                const songs = state.messes[state.currentMesseIdx].songs;
                const item = songs.splice(e.oldIndex, 1)[0];
                songs.splice(e.newIndex, 0, item);
                save();
            }
        });
    }

    function addSong(id) {
        const s = state.songs.find(x => x.id === id);
        state.messes[state.currentMesseIdx].songs.push({...s});
        save(); editMesse(state.currentMesseIdx);
    }

    // --- LOGIQUE PLEIN ÉCRAN & LECTURE ---
    async function startMesse(idx) {
        state.activeSet = state.messes[idx].songs;
        if(state.activeSet.length === 0) return;
        
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        
        document.getElementById('performance-mode').style.display = 'flex';
        state.currentIdx = 0;
        await loadDoc(state.activeSet[0].url);
    }

    async function loadDoc(url) {
        document.getElementById('perf-song-name').innerText = state.activeSet[state.currentIdx].name;
        state.pdf = await pdfjsLib.getDocument(url).promise;
        state.pageNum = 1;
        renderPage();
    }

    async function renderPage() {
        const page = await state.pdf.getPage(state.pageNum);
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        
        // Calcul du plein écran intelligent (Best Fit)
        const unscaledViewport = page.getViewport({ scale: 1 });
        const scale = Math.min(window.innerWidth / unscaledViewport.width, window.innerHeight / unscaledViewport.height);
        const viewport = page.getViewport({ scale: scale * window.devicePixelRatio });

        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.width = (viewport.width / window.devicePixelRatio) + "px";
        canvas.style.height = (viewport.height / window.devicePixelRatio) + "px";

        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        document.getElementById('perf-page-count').innerText = `Titre ${state.currentIdx + 1} / ${state.activeSet.length} • Page ${state.pageNum} / ${state.pdf.numPages}`;
    }

    function nextPage(e) {
        if(e) e.stopPropagation();
        if(state.pageNum < state.pdf.numPages) {
            state.pageNum++; renderPage();
        } else if(state.currentIdx < state.activeSet.length - 1) {
            state.currentIdx++; loadDoc(state.activeSet[state.currentIdx].url);
        }
    }

    function prevPage(e) {
        if(e) e.stopPropagation();
        if(state.pageNum > 1) {
            state.pageNum--; renderPage();
        } else if(state.currentIdx > 0) {
            state.currentIdx--; loadDoc(state.activeSet[state.currentIdx].url);
        }
    }

    function handleCenterTap(e) {
        // Si on tape au milieu (entre les zones de tap latérales), on affiche/cache la toolbar
        document.getElementById('performance-mode').classList.toggle('show-ui');
    }

    function exitPerformance() {
        if (document.exitFullscreen) document.exitFullscreen();
        document.getElementById('performance-mode').style.display = 'none';
    }

    // --- HELPERS ---
    function save() { localStorage.setItem('messes_v2', JSON.stringify(state.messes)); }
    function newMesse() { 
        const n = prompt("Nom de la Messe :"); 
        if(n) { state.messes.push({name: n, songs: []}); save(); showView('planner'); }
    }
    function deleteMesse(i) { if(confirm("Supprimer ?")) { state.messes.splice(i,1); save(); showView('planner'); } }
    
    // Redimensionnement auto lors de la rotation de la tablette
    window.addEventListener('resize', () => { if(state.pdf) renderPage(); });

    init();
</script>
</body>
</html>
