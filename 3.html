<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantus Pro - Lecteur de Partitions</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #1a1a1a;
            --primary-color: #2979ff;
            --accent-color: #ff1744;
            --text-color: #f5f5f5;
            --border-color: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100%; overflow: hidden;
        }

        #app { display: flex; flex-direction: column; height: 100vh; background: #121212; }
        
        header {
            background: var(--surface-color);
            padding: 0.8rem 1rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        nav {
            display: flex; gap: 10px; padding: 10px;
            background: var(--surface-color);
        }

        .btn {
            background: #333; color: white; border: none;
            padding: 12px 20px; border-radius: 8px;
            cursor: pointer; font-size: 1rem; display: flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary-color); }
        .btn-accent { background: var(--accent-color); }

        main { flex: 1; overflow-y: auto; padding: 15px; }

        .search-bar, .input-field {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #252525; color: white; margin-bottom: 10px;
            font-size: 1rem;
        }

        textarea.input-field {
            height: 80px; resize: none; font-family: inherit;
        }

        .song-card {
            background: var(--surface-color);
            padding: 15px; margin-bottom: 8px;
            border-radius: 10px; display: flex;
            justify-content: space-between; align-items: center;
        }

        /* --- MODE PERFORMANCE --- */
        #performance-mode {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }

        #pdf-viewport {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        canvas { display: block; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        #text-display {
            display: none; color: white; text-align: center;
            padding: 40px; max-width: 90vw; overflow-y: auto; max-height: 80vh;
        }
        
        #note-title-display { font-size: 1.5rem; color: var(--primary-color); margin-bottom: 20px; font-weight: bold; }
        #note-content-display { font-size: 2.2rem; white-space: pre-wrap; line-height: 1.4; }

        .tap-zone { position: absolute; top: 0; height: 100%; width: 20%; z-index: 100; }
        .tap-left { left: 0; }
        .tap-right { right: 0; }

        #perf-toolbar {
            position: absolute; top: 0; width: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            padding: 10px 20px; display: flex; justify-content: space-between;
            align-items: center; z-index: 200;
            transform: translateY(-100%); transition: transform 0.2s;
        }
        #performance-mode.show-ui #perf-toolbar { transform: translateY(0); }

        /* --- ÉDITEUR --- */
        .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: calc(100vh - 220px); }
        .col { background: var(--surface-color); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; }
        .list-box { flex: 1; overflow-y: auto; border: 1px solid #333; border-radius: 8px; margin-top: 10px; }
        .item { padding: 12px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .item-note { border-left: 4px solid var(--primary-color); background: #222; }
        
        .note-form { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 10px; }

        @media (max-width: 600px) {
            .editor-grid { grid-template-columns: 1fr; height: auto; }
            .col { height: 400px; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h2 style="margin:0">CANTUS</h2>
        <div id="sync-status" style="font-size: 0.7rem; color: #666;">Prêt</div>
    </header>
    <nav>
        <button class="btn" onclick="showView('library')"><i class="fas fa-music"></i> Bibliothèque</button>
        <button class="btn" onclick="showView('planner')"><i class="fas fa-calendar-alt"></i> Messes</button>
    </nav>
    <main id="content"></main>
</div>

<div id="performance-mode">
    <div id="perf-toolbar">
        <button class="btn btn-primary" onclick="exitPerformance()"><i class="fas fa-arrow-left"></i> Quitter</button>
        <div style="text-align: center">
            <div id="perf-song-name" style="font-weight:bold; font-size:1.1rem">CHANT</div>
            <div id="perf-page-count" style="font-size:0.8rem; color:#aaa">1 / 1</div>
        </div>
        <div style="width:50px"></div>
    </div>
    
    <div id="pdf-viewport" onclick="handleCenterTap(event)">
        <div class="tap-zone tap-left" onclick="prevPage(event)"></div>
        <div class="tap-zone tap-right" onclick="nextPage(event)"></div>
        <canvas id="pdf-canvas"></canvas>
        <div id="text-display">
            <div id="note-title-display"></div>
            <div id="note-content-display"></div>
        </div>
    </div>
</div>

<script>
    const GITHUB_USER = 'Cyprdu'; 
    const GITHUB_REPO = 'messe';
    const GITHUB_PATH = 'partitions';

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let state = {
        songs: [],
        messes: JSON.parse(localStorage.getItem('messes_v3')) || [],
        currentMesseIdx: null,
        activeSet: [],
        currentIdx: 0,
        pdf: null,
        pageNum: 1
    };

    async function init() {
        await loadLibrary();
        showView('library');
    }

    async function loadLibrary() {
        try {
            const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`);
            const d = await r.json();
            state.songs = d.filter(f => f.name.endsWith('.pdf')).map(f => ({
                id: f.sha,
                type: 'song',
                name: f.name.replace('.pdf', '').replace(/_/g, ' ').toUpperCase(),
                url: f.download_url
            }));
            localStorage.setItem('cache_songs_v3', JSON.stringify(state.songs));
            document.getElementById('sync-status').innerText = "À jour";
        } catch(e) {
            state.songs = JSON.parse(localStorage.getItem('cache_songs_v3')) || [];
            document.getElementById('sync-status').innerText = "Hors-ligne";
        }
    }

    function showView(v) {
        const c = document.getElementById('content');
        if(v === 'library') {
            c.innerHTML = `<input type="text" class="search-bar" placeholder="Rechercher un chant..." oninput="searchSongs(this.value)">
                           <div id="lib-list">${renderList(state.songs)}</div>`;
        } else if(v === 'planner') {
            c.innerHTML = `<button class="btn btn-primary" onclick="newMesse()" style="width:100%; margin-bottom:15px;">+ Nouvelle Messe</button>
                           <div id="messes-list">${renderMesses()}</div>`;
        }
    }

    function renderList(list) {
        return list.map(s => `
            <div class="song-card">
                <span style="font-weight: 500;">${s.name}</span>
                <button class="btn btn-primary" onclick="playSingle('${s.id}')">
                    <i class="fas fa-play"></i>
                </button>
            </div>`).join('');
    }

    function renderMesses() {
        return state.messes.map((m, i) => `
            <div class="song-card">
                <span><strong>${m.name}</strong> (${m.songs.length} élém.)</span>
                <div style="display:flex; gap:8px">
                    <button class="btn" onclick="editMesse(${i})"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-accent" onclick="startPerformance(state.messes[${i}].songs)"><i class="fas fa-play"></i></button>
                </div>
            </div>`).join('');
    }

    function normalizeSearch(str) {
        return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/[-_,'".]/g, " ").replace(/\bsaint\b/g, "st").replace(/\bsainte\b/g, "ste").trim();
    }

    function searchSongs(query) {
        const q = normalizeSearch(query);
        const filtered = state.songs.filter(s => normalizeSearch(s.name).includes(q));
        document.getElementById('lib-list').innerHTML = renderList(filtered);
    }

    function playSingle(id) {
        const song = state.songs.find(s => s.id === id);
        if (song) startPerformance([song]);
    }

    // --- PERFORMANCE ---
    async function startPerformance(setlist) {
        if (!setlist || setlist.length === 0) return;
        state.activeSet = setlist;
        state.currentIdx = 0;
        document.getElementById('performance-mode').style.display = 'flex';
        await loadItem();
    }

    async function loadItem() {
        const item = state.activeSet[state.currentIdx];
        const canvas = document.getElementById('pdf-canvas');
        const textDisplay = document.getElementById('text-display');
        
        document.getElementById('perf-song-name').innerText = item.name.toUpperCase();

        if (item.type === 'note') {
            canvas.style.display = 'none';
            textDisplay.style.display = 'block';
            document.getElementById('note-title-display').innerText = item.name.toUpperCase();
            document.getElementById('note-content-display').innerText = item.content || "";
            document.getElementById('perf-page-count').innerText = `${state.currentIdx + 1} / ${state.activeSet.length}`;
            state.pdf = null;
        } else {
            canvas.style.display = 'block';
            textDisplay.style.display = 'none';
            state.pdf = await pdfjsLib.getDocument(item.url).promise;
            state.pageNum = 1;
            renderPage();
        }
    }

    async function renderPage() {
        if (!state.pdf) return;
        const page = await state.pdf.getPage(state.pageNum);
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const viewport = page.getViewport({ scale: Math.min(window.innerWidth / page.getViewport({scale:1}).width, window.innerHeight / page.getViewport({scale:1}).height) * window.devicePixelRatio });
        canvas.width = viewport.width; canvas.height = viewport.height;
        canvas.style.width = (viewport.width / window.devicePixelRatio) + "px";
        canvas.style.height = (viewport.height / window.devicePixelRatio) + "px";
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        document.getElementById('perf-page-count').innerText = `Élém. ${state.currentIdx + 1}/${state.activeSet.length} • P. ${state.pageNum}/${state.pdf.numPages}`;
    }

    function nextPage() {
        if(state.pdf && state.pageNum < state.pdf.numPages) { state.pageNum++; renderPage(); }
        else if(state.currentIdx < state.activeSet.length - 1) { state.currentIdx++; loadItem(); }
    }

    function prevPage() {
        if(state.pdf && state.pageNum > 1) { state.pageNum--; renderPage(); }
        else if(state.currentIdx > 0) { state.currentIdx--; loadItem(); }
    }

    function handleCenterTap() { document.getElementById('performance-mode').classList.toggle('show-ui'); }
    function exitPerformance() { document.getElementById('performance-mode').style.display = 'none'; state.pdf = null; }

    // --- GESTION MESSES ---
    function newMesse() { 
        const n = prompt("Nom de la Messe :"); 
        if(n) { state.messes.push({name: n, songs: []}); save(); showView('planner'); }
    }

    function editMesse(idx) {
        state.currentMesseIdx = idx;
        const m = state.messes[idx];
        document.getElementById('content').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <button class="btn" onclick="showView('planner')">Retour</button>
                <h3 style="margin:0">${m.name}</h3>
                <button class="btn btn-accent" onclick="deleteMesse(${idx})"><i class="fas fa-trash"></i></button>
            </div>
            <div class="editor-grid">
                <div class="col">
                    <input type="text" class="search-bar" placeholder="Chercher un PDF..." oninput="filterEditor(this.value)">
                    <div id="editor-lib" class="list-box">${renderEditorList(state.songs)}</div>
                </div>
                <div class="col">
                    <div class="note-form">
                        <input type="text" id="note-title" class="input-field" placeholder="Titre (ex: PREMIÈRE LECTURE)">
                        <textarea id="note-content" class="input-field" placeholder="Texte ou Accords..."></textarea>
                        <button class="btn btn-primary" style="width:100%" onclick="addFullNote()">Ajouter cette note</button>
                    </div>
                    <div id="messe-sortable" class="list-box" style="margin-top:0">
                        ${m.songs.map((s, i) => `
                            <div class="item ${s.type === 'note' ? 'item-note' : ''}" data-id="${i}">
                                <i class="fas ${s.type === 'note' ? 'fa-sticky-note' : 'fa-bars'}"></i> 
                                <span style="flex:1">${s.name}</span>
                                <i class="fas fa-times" style="color:#666" onclick="removeItem(${i})"></i>
                            </div>`).join('')}
                    </div>
                </div>
            </div>`;
        
        new Sortable(document.getElementById('messe-sortable'), {
            animation: 150,
            onEnd: (e) => {
                const songs = state.messes[state.currentMesseIdx].songs;
                songs.splice(e.newIndex, 0, songs.splice(e.oldIndex, 1)[0]);
                save();
            }
        });
    }

    function renderEditorList(list) {
        return list.map(s => `<div class="item" onclick="addSong('${s.id}')">${s.name}</div>`).join('');
    }

    function filterEditor(query) {
        const q = normalizeSearch(query);
        const filtered = state.songs.filter(s => normalizeSearch(s.name).includes(q));
        document.getElementById('editor-lib').innerHTML = renderEditorList(filtered);
    }

    function addSong(id) {
        const s = state.songs.find(x => x.id === id);
        state.messes[state.currentMesseIdx].songs.push({...s});
        save(); editMesse(state.currentMesseIdx);
    }

    function addFullNote() {
        const title = document.getElementById('note-title').value.trim();
        const content = document.getElementById('note-content').value.trim();
        if (title) {
            state.messes[state.currentMesseIdx].songs.push({ type: 'note', name: title.toUpperCase(), content: content });
            save(); editMesse(state.currentMesseIdx);
        } else { alert("Donnez au moins un titre à la note."); }
    }

    function removeItem(i) {
        state.messes[state.currentMesseIdx].songs.splice(i, 1);
        save(); editMesse(state.currentMesseIdx);
    }

    function save() { localStorage.setItem('messes_v3', JSON.stringify(state.messes)); }
    function deleteMesse(i) { if(confirm("Supprimer la messe ?")) { state.messes.splice(i,1); save(); showView('planner'); } }

    init();
</script>
</body>
</html>
